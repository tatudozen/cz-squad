version: '3.8'

services:
  api:
    image: docker.io/tatudozen/copyzen-api:latest
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OPERATOR_API_KEY=${OPERATOR_API_KEY}
    ports:
      - "3000:3000"
    networks:
      - AZ_NET
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      labels:
        - "com.example.description=CopyZen API Service"
        - "traefik.enable=true"
        - "traefik.http.routers.copyzen-api.rule=Host(`fw.alquimiazen.com.br`)"
        - "traefik.http.routers.copyzen-api.entrypoints=web"
        - "traefik.http.services.copyzen-api.loadbalancer.server.port=3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  AZ_NET:
    driver: overlay
    driver_opts:
      com.docker.network.driver.overlay.vxlanid: "4096"
